apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: docker.dev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-stf
                port:
                  number: 8081