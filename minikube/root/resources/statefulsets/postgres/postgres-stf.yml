apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stf
spec:
  serviceName: postgres-stf
  replicas: 1
  selector:
    matchLabels:
      app: postgres-stf

  template:
    metadata:
      labels:
        app: postgres-stf
    spec:
      containers:
        - name: postgres-stf
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret-stf
          volumeMounts:
            - name: postgres-data-stf
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

  volumeClaimTemplates:
    - metadata:
        name: postgres-data-stf
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi